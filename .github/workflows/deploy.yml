name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker compose build

      - name: Test
        run: |
          docker compose run --rm app sh -c "
            if [ -f 'go.mod' ]; then
              echo 'Detected: Go'
              go test ./...
            elif [ -f 'pytest.ini' ] || [ -f 'pyproject.toml' ] || [ -f 'setup.py' ] || [ -d 'tests' ]; then
              echo 'Detected: Python'
              python -m pytest || python -m unittest discover
            elif [ -f 'package.json' ]; then
              if [ -f 'bun.lockb' ]; then
                bun test
              elif [ -f 'pnpm-lock.yaml' ]; then
                pnpm test
              elif [ -f 'yarn.lock' ]; then
                yarn test
              else
                npm test
              fi
            elif [ -f 'Gemfile' ]; then
              bundle exec rspec || bundle exec rake test
            elif [ -f 'Cargo.toml' ]; then
              cargo test
            elif [ -f 'pom.xml' ]; then
              mvn test
            elif [ -f 'build.gradle' ] || [ -f 'build.gradle.kts' ]; then
              ./gradlew test
            elif [ -f 'composer.json' ]; then
              ./vendor/bin/phpunit || composer test
            elif [ -f 'mix.exs' ]; then
              mix test
            elif [ -f 'pubspec.yaml' ]; then
              dart test || flutter test
            elif [ -f 'Package.swift' ]; then
              swift test
            elif [ -f 'stack.yaml' ]; then
              stack test
            elif [ -f 'build.sbt' ]; then
              sbt test
            elif [ -f 'project.clj' ]; then
              lein test
            elif [ -f 'deps.edn' ]; then
              clojure -M:test
            elif [ -f 'shard.yml' ]; then
              crystal spec
            elif [ -f 'build.zig' ]; then
              zig build test
            elif [ -f 'dune-project' ]; then
              dune runtest
            elif [ -f 'rebar.config' ]; then
              rebar3 eunit
            elif [ -f 'dub.json' ] || [ -f 'dub.sdl' ]; then
              dub test
            else
              echo 'No test framework detected, skipping'
              exit 0
            fi
          "

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set image name lowercase
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/projects/${{ github.event.repository.name }}
            docker compose pull
            docker compose up -d
            docker image prune -f
